<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Personagem - Altaris RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --azul-claro: #e8f4f8;
            --azul-médio: #c5e3f0;
            --azul-forte: #4a9aca;
            --azul-escuro: #2d5a7b;
            --branco-quente: #fafbfb;
            --sombra: rgba(74, 154, 202, 0.1);
            --sombra-forte: rgba(45, 90, 123, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f0f8fb 0%, #e8f4f8 100%);
            color: var(--azul-escuro);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Background decorativo suave */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(74, 154, 202, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(74, 154, 202, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: var(--branco-quente);
            border-radius: 30px;
            padding: 35px 40px;
            box-shadow: 0 20px 60px var(--sombra-forte),
                        0 0 0 1px rgba(74, 154, 202, 0.1);
            position: relative;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .ornamento-topo {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 20px;
            opacity: 0.4;
            color: var(--azul-forte);
        }

        h1 {
            font-size: 38px;
            color: var(--azul-forte);
            margin-bottom: 6px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .subtitulo {
            font-size: 13px;
            color: var(--azul-médio);
            font-style: italic;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* Seções */
        section {
            margin-bottom: 28px;
        }

        .section-titulo {
            font-size: 16px;
            color: var(--azul-escuro);
            margin-bottom: 15px;
            font-weight: 600;
            position: relative;
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-titulo::after {
            content: '';
            flex-grow: 1;
            height: 2px;
            background: linear-gradient(90deg, var(--azul-forte), transparent);
            border-radius: 1px;
        }

        .section-icone {
            font-size: 20px;
        }

        /* Grid de campos básicos */
        .grid-basico {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 0;
        }

        .campo-basico {
            display: flex;
            flex-direction: column;
        }

        .campo-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--azul-forte);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }

        .campo-input {
            background: linear-gradient(135deg, #f9fdff 0%, var(--azul-claro) 100%);
            border: 2px solid var(--azul-médio);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--azul-escuro);
            font-weight: 500;
            transition: all 0.3s ease;
            min-height: 38px;
            font-family: inherit;
            cursor: text;
        }

        .campo-input::placeholder {
            color: rgba(74, 154, 202, 0.3);
        }

        .campo-input:hover {
            border-color: var(--azul-forte);
            box-shadow: 0 8px 20px var(--sombra);
            transform: translateY(-2px);
        }

        .campo-input:focus {
            outline: none;
            border-color: var(--azul-forte);
            box-shadow: 0 12px 30px var(--sombra),
                        inset 0 0 0 1px var(--azul-médio);
            background: var(--branco-quente);
        }

        /* Seção de atributos */
        .grid-atributos {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .atributo-card {
            background: linear-gradient(135deg, var(--azul-claro) 0%, var(--azul-médio) 100%);
            border: 2px solid var(--azul-forte);
            border-radius: 18px;
            padding: 22px 16px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px var(--sombra);
        }

        .atributo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px var(--sombra-forte);
            border-color: var(--azul-escuro);
        }

        .atributo-nome {
            font-size: 12px;
            font-weight: 700;
            color: var(--azul-escuro);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .atributo-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            border: 2px solid var(--azul-forte);
            border-radius: 10px;
            padding: 10px;
            font-size: 32px;
            font-weight: 700;
            color: var(--azul-forte);
            text-align: center;
            transition: all 0.3s ease;
            font-family: inherit;
            cursor: text;
        }

        .atributo-input:hover {
            box-shadow: 0 6px 15px var(--sombra);
        }

        .atributo-input:focus {
            outline: none;
            background: var(--branco-quente);
            border-color: var(--azul-escuro);
        }

        /* Conhecimentos */
        .conhecimentos-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
        }

        .conhecimento-item {
            background: var(--azul-claro);
            border: 2px solid var(--azul-médio);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 12px;
            color: var(--azul-escuro);
            min-height: 40px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            cursor: text;
            font-weight: 500;
        }

        .conhecimento-item:hover {
            border-color: var(--azul-forte);
            box-shadow: 0 6px 15px var(--sombra);
            transform: translateY(-2px);
        }

        .conhecimento-item:focus-within {
            border-color: var(--azul-escuro);
            background: var(--branco-quente);
        }

        /* Habilidades */
        .habilidades-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            width: 100%;
        }

        .habilidades-container::-webkit-scrollbar-track {
            background: var(--azul-claro);
            border-radius: 10px;
        }

        .habilidades-container::-webkit-scrollbar-thumb {
            background: var(--azul-médio);
            border-radius: 10px;
        }

        .habilidades-container::-webkit-scrollbar-thumb:hover {
            background: var(--azul-forte);
        }

        .habilidade-card {
            background: var(--branco-quente);
            border: 2px solid var(--azul-médio);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px var(--sombra);
            display: flex;
            flex-direction: column;
            min-height: 200px;
        }

        .habilidade-card:hover {
            border-color: var(--azul-forte);
            box-shadow: 0 10px 25px var(--sombra-forte);
            transform: translateY(-3px);
        }

        .habilidade-titulo {
            background: linear-gradient(135deg, var(--azul-claro) 0%, var(--azul-médio) 100%);
            border-bottom: 2px solid var(--azul-médio);
            padding: 10px 14px;
            font-size: 12px;
            font-weight: 700;
            color: var(--azul-escuro);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            cursor: text;
            user-select: text;
            outline: none;
        }

        .habilidade-titulo:focus {
            background: linear-gradient(135deg, var(--azul-médio) 0%, var(--azul-claro) 100%);
        }

        .habilidade-descricao {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 14px;
            font-size: 12px;
            color: var(--azul-escuro);
            transition: all 0.3s ease;
            font-family: inherit;
            font-weight: 500;
            resize: none;
            cursor: text;
            min-height: 140px;
            line-height: 1.6;
        }

        .habilidade-descricao::placeholder {
            color: rgba(74, 154, 202, 0.3);
        }

        .habilidade-descricao:focus {
            outline: none;
            background: rgba(74, 154, 202, 0.05);
        }

        /* Equipamentos */
        .equipamentos-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
        }

        .equipamento-item {
            background: var(--azul-claro);
            border: 2px solid var(--azul-médio);
            border-radius: 12px;
            padding: 12px;
            min-height: 48px;
            font-size: 12px;
            color: var(--azul-escuro);
            transition: all 0.3s ease;
            cursor: text;
            font-weight: 500;
            display: flex;
            align-items: center;
        }

        .equipamento-item:hover {
            border-color: var(--azul-forte);
            box-shadow: 0 6px 15px var(--sombra);
            transform: translateY(-2px);
        }

        /* Anotações */
        .anotacoes-area {
            background: linear-gradient(135deg, var(--azul-claro) 0%, #f5fafb 100%);
            border: 2px solid var(--azul-médio);
            border-radius: 16px;
            padding: 16px;
            min-height: 130px;
            font-size: 13px;
            color: var(--azul-escuro);
            resize: vertical;
            font-family: inherit;
            transition: all 0.3s ease;
            font-weight: 500;
            line-height: 1.5;
        }

        .anotacoes-area::placeholder {
            color: rgba(74, 154, 202, 0.3);
        }

        .anotacoes-area:hover {
            border-color: var(--azul-forte);
            box-shadow: 0 8px 20px var(--sombra);
        }

        .anotacoes-area:focus {
            outline: none;
            border-color: var(--azul-forte);
            box-shadow: 0 12px 30px var(--sombra-forte),
                        inset 0 0 0 1px var(--azul-médio);
            background: var(--branco-quente);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 16px;
            border-top: 2px solid var(--azul-médio);
            font-size: 11px;
            color: var(--azul-médio);
            font-style: italic;
        }

        /* Efeito decorativo */
        .ornamento-canto {
            position: absolute;
            opacity: 0.15;
            color: var(--azul-forte);
            pointer-events: none;
        }

        .ornamento-topo-esq {
            top: 20px;
            left: 20px;
            font-size: 30px;
        }

        .ornamento-topo-dir {
            top: 20px;
            right: 20px;
            font-size: 30px;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .container {
                padding: 28px 30px;
            }

            h1 {
                font-size: 32px;
            }

            .grid-basico {
                grid-template-columns: 1fr 1fr;
            }

            .grid-atributos {
                grid-template-columns: 1fr 1fr;
            }

            .conhecimentos-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .habilidades-container {
                grid-template-columns: repeat(2, 1fr);
            }

            .equipamentos-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 28px;
            }

            .grid-basico {
                grid-template-columns: 1fr;
            }

            .grid-atributos {
                grid-template-columns: 1fr;
            }

            .conhecimentos-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .equipamentos-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Animação suave de entrada */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            animation: fadeInUp 0.6s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ornamento-canto ornamento-topo-esq">✦</div>
        <div class="ornamento-canto ornamento-topo-dir">✦</div>

        <!-- Header -->
        <div class="header">
            <div class="ornamento-topo">✧ ◆ ✧</div>
            <h1>Altaris RPG</h1>
            <p class="subtitulo">Ficha de Personagem</p>
        </div>

        <!-- Informações Básicas -->
        <section>
            <div class="section-titulo">
                <span class="section-icone">👤</span>
                Informações Básicas
            </div>
            <div class="grid-basico">
                <div class="campo-basico">
                    <label class="campo-label">Nome</label>
                    <input type="text" class="campo-input" placeholder="Nome do seu personagem">
                </div>
                <div class="campo-basico">
                    <label class="campo-label">Espécie</label>
                    <input type="text" class="campo-input" placeholder="Ex: Humano, Elfo, Anão">
                </div>
                <div class="campo-basico">
                    <label class="campo-label">Classe</label>
                    <input type="text" class="campo-input" placeholder="Ex: Guerreiro, Mago">
                </div>
                <div class="campo-basico">
                    <label class="campo-label">Origem</label>
                    <input type="text" class="campo-input" placeholder="Sua origem ou reino">
                </div>
                <div class="campo-basico">
                    <label class="campo-label">Foco</label>
                    <input type="text" class="campo-input" placeholder="Seu foco principal">
                </div>
            </div>
        </section>

        <!-- Atributos Principais -->
        <section>
            <div class="section-titulo">
                <span class="section-icone">⚡</span>
                Atributos Principais
            </div>
            <div class="grid-atributos">
                <div class="atributo-card">
                    <div class="atributo-nome">Pontos de Vida</div>
                    <input type="number" class="atributo-input" placeholder="0" min="0">
                </div>
                <div class="atributo-card">
                    <div class="atributo-nome">Pontos de Energia</div>
                    <input type="number" class="atributo-input" placeholder="0" min="0">
                </div>
            </div>
        </section>

        <!-- Conhecimentos -->
        <section>
            <div class="section-titulo">
                <span class="section-icone">📚</span>
                Conhecimentos
            </div>
            <div class="conhecimentos-grid">
                <div class="conhecimento-item" contenteditable="true"></div>
                <div class="conhecimento-item" contenteditable="true"></div>
                <div class="conhecimento-item" contenteditable="true"></div>
                <div class="conhecimento-item" contenteditable="true"></div>
            </div>
        </section>

        <!-- Habilidades -->
        <section>
            <div class="section-titulo">
                <span class="section-icone">🎯</span>
                Habilidades
            </div>
            <div class="habilidades-container">
                <div class="habilidade-card">
                    <div class="habilidade-titulo" contenteditable="true">Habilidade 1</div>
                    <textarea class="habilidade-descricao" placeholder="Descreva a habilidade..."></textarea>
                </div>
                <div class="habilidade-card">
                    <div class="habilidade-titulo" contenteditable="true">Habilidade 2</div>
                    <textarea class="habilidade-descricao" placeholder="Descreva a habilidade..."></textarea>
                </div>
                <div class="habilidade-card">
                    <div class="habilidade-titulo" contenteditable="true">Habilidade 3</div>
                    <textarea class="habilidade-descricao" placeholder="Descreva a habilidade..."></textarea>
                </div>
            </div>
        </section>

        <!-- Equipamentos -->
        <section>
            <div class="section-titulo">
                <span class="section-icone">⚔️</span>
                Equipamentos
            </div>
            <div class="equipamentos-container">
                <div class="equipamento-item" contenteditable="true"></div>
                <div class="equipamento-item" contenteditable="true"></div>
                <div class="equipamento-item" contenteditable="true"></div>
                <div class="equipamento-item" contenteditable="true"></div>
            </div>
        </section>

        <!-- Anotações -->
        <section>
            <div class="section-titulo">
                <span class="section-icone">📝</span>
                Anotações
            </div>
            <textarea class="anotacoes-area" placeholder="Use este espaço para suas notas, histórico e observações sobre o personagem..."></textarea>
        </section>

        <!-- Footer -->
        <div class="footer">
            ✦ Uma ficha elegante para suas aventuras em Altaris ✦
        </div>
    </div>
</body>
</html>
